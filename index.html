<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DRG Builds</title>
  <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    html, body {
      height: 100%;
      overflow: hidden;
    }
    
    body {
      font-family: 'Exo 2', sans-serif;
      background: #0d1117;
      overflow: hidden;
    }
    
    .overlay {
      width: 100%;
      height: 100vh;
      min-width: 400px;
      min-height: 300px;
      background: linear-gradient(145deg, #0d1117 0%, #0a0e12 50%, #0d1117 100%);
      border: 2px solid #2d333b;
      border-radius: 16px;
      color: #e8e8e8;
      box-shadow: 
        0 0 60px rgba(74, 156, 45, 0.15),
        0 25px 50px rgba(0, 0, 0, 0.5),
        inset 0 1px 0 rgba(255, 255, 255, 0.05);
      opacity: 0;
      transform: scale(0.96);
      transition: all 0.2s cubic-bezier(0.22, 1, 0.36, 1);
      overflow: auto;
      pointer-events: auto;
    }
    
    .header, .header *,
.controls, .controls *,
.tab-btn, .tab-btn *,
.class-btn, .class-btn *,
.weapon-btn, .weapon-btn *,
.modal-close, .modal-close *,
.setting-input, .setting-input *,
.form-input, .form-input *,
.form-select, .form-select *,
.form-textarea, .form-textarea *,
.back-btn, .back-btn * {
  -webkit-app-region: no-drag;
}
    
    .overlay.visible {
      pointer-events: auto;
      opacity: 1;
      transform: scale(1);
    }
    

    
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 12px 16px;
  border-bottom: 1px solid rgba(45, 51, 59, 0.5);
  background: linear-gradient(180deg, rgba(255,255,255,0.02) 0%, transparent 100%);
  height: 50px;
  box-sizing: border-box;
  pointer-events: auto;
  position: relative;
  z-index: 1001;
}
.header * {
  -webkit-app-region: no-drag;
}
    

      display: flex;
      align-items: center;
      gap: 12px;
      pointer-events: auto;
    }
    
    .logo {
    }
    
    .logo-text {
      font-size: 18px;
      font-weight: 700;
      color: #4a9c2d;
      text-transform: uppercase;
      letter-spacing: 2px;
      text-shadow: 0 0 15px rgba(74, 156, 45, 0.4);
    }
    
    .controls {
      display: flex;
      gap: 6px;
      pointer-events: auto;
    }
    
    .icon-btn {
      background: #1a1f26;
      border: 1px solid #2d333b;
      color: #888;
      width: 28px;
      height: 28px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .icon-btn:hover {
      background: #252b33;
      color: #aaa;
      transform: scale(1.05);
    }
    
    .close-btn {
      background: linear-gradient(135deg, #c93a3a, #a32e2e);
      border: none;
      color: white;
    }
    
    .close-btn:hover {
      background: linear-gradient(135deg, #e04545, #c93a3a);
    }
    
    .tabs {
      display: flex;
      gap: 4px;
      padding: 8px 16px;
      background: rgba(0, 0, 0, 0.3);
      border-bottom: 1px solid rgba(45, 51, 59, 0.5);
      pointer-events: auto;
    }
    
    .tab-btn {
      flex: 1;
      padding: 10px 16px;
      background: #12161c;
      border: 2px solid #2d333b;
      border-radius: 8px;
      color: #666;
      cursor: pointer;
      font-family: 'Exo 2', sans-serif;
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    
    .tab-btn:hover {
      transform: translateY(-2px);
      color: #aaa;
    }
    
    .tab-btn.active {
      background: linear-gradient(135deg, #1a2a1c, #0f1a10);
      border-color: #3a7a22;
      color: #6abc4d;
      box-shadow: 0 0 10px rgba(74, 156, 45, 0.15), 0 4px 12px rgba(0, 0, 0, 0.3);
    }
    
    .tab-btn[data-tab="mybuilds"].active {
      background: linear-gradient(135deg, #1a2a3a, #0f1520);
      border-color: #3a6f99;
      color: #6a9fc9;
      box-shadow: 0 0 10px rgba(74, 143, 201, 0.15), 0 4px 12px rgba(0, 0, 0, 0.3);
    }
    
    .class-select {
      display: flex;
      gap: 8px;
      padding: 12px 16px;
      background: rgba(0, 0, 0, 0.2);
    }
    
    .class-btn {
      flex: 1;
      padding: 10px 6px;
      background: #12161c;
      border: 2px solid #2d333b;
      border-radius: 10px;
      color: #666;
      cursor: pointer;
      font-family: 'Exo 2', sans-serif;
      font-size: 14px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
    }
    
    .class-btn .icon {
      font-size: 18px;
      line-height: 1;
      transition: transform 0.3s ease;
    }
    
    .class-btn .class-icon {
      width: 28px;
      height: 28px;
      object-fit: contain;
      transition: transform 0.3s ease;
    }
    
    .class-btn:hover {
      transform: translateY(-2px);
    }
    
    .class-btn:hover .icon {
      transform: scale(1.15);
    }
    
    .class-btn.gunner { color: #5a8c4d; }
    .class-btn.gunner:hover, .class-btn.gunner.active {
      background: linear-gradient(135deg, #1a2a1c, #0f1a10);
      border-color: #3a7a22;
      box-shadow: 0 0 12px rgba(74, 156, 45, 0.2), 0 4px 12px rgba(0, 0, 0, 0.3);
    }
    
    .class-btn.engineer { color: #c05555; }
    .class-btn.engineer:hover, .class-btn.engineer.active {
      background: linear-gradient(135deg, #2a1a1c, #1a0f10);
      border-color: #a03535;
      box-shadow: 0 0 12px rgba(224, 85, 85, 0.2), 0 4px 12px rgba(0, 0, 0, 0.3);
    }
    
    .class-btn.driller { color: #c4a017; }
    .class-btn.driller:hover, .class-btn.driller.active {
      background: linear-gradient(135deg, #2a2116, #1a150f);
      border-color: #a07010;
      box-shadow: 0 0 12px rgba(212, 160, 23, 0.2), 0 4px 12px rgba(0, 0, 0, 0.3);
    }
    
    .class-btn.scout { color: #5a8fa9; }
    .class-btn.scout:hover, .class-btn.scout.active {
      background: linear-gradient(135deg, #162a3a, #0f1a25);
      border-color: #3a6f99;
      box-shadow: 0 0 12px rgba(74, 143, 201, 0.2), 0 4px 12px rgba(0, 0, 0, 0.3);
    }
    
    .weapon-select {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      grid-template-rows: repeat(3, 1fr);
      gap: 6px;
      padding: 8px 16px;
      background: rgba(0, 0, 0, 0.15);
      width: 100%;
      height: 70%;
      box-sizing: border-box;
    }
    
    .weapon-btn {
      background: #12161c;
      border: 1px solid #2d333b;
      border-radius: 6px;
      color: #888;
      cursor: pointer;
      font-family: 'Exo 2', sans-serif;
      font-size: 14px;
      font-weight: 600;
      transition: all 0.2s ease;
      text-align: center;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 55px;
      padding: 8px;
      font-feature-settings: "liga" 1, "kern" 1;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      font-variant-numeric: tabular-nums;
      font-size-adjust: 0.55;
    }
    
    .weapon-btn:hover {
      background: #1a2028;
      color: #aaa;
    }
    
    .weapon-btn.active {
      background: #1a2530;
      border-color: #4a8fc9;
      color: #4a8fc9;
    }
    
    .search-box {
      padding: 8px 16px;
      background: rgba(0, 0, 0, 0.3);
      border-bottom: 1px solid rgba(45, 51, 59, 0.5);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .search-input {
      flex: 1;
      background: #12161c;
      border: 1px solid #2d333b;
      border-radius: 6px;
      padding: 8px 12px;
      color: #e8e8e8;
      font-family: 'Exo 2', sans-serif;
      font-size: 14px;
      outline: none;
    }
    
    .search-input:focus {
      border-color: #4a9c2d;
    }
    
    .search-input::placeholder {
      color: #6a7a8a;
    }
    
    .search-clear {
      color: #6a7a8a;
      font-size: 20px;
      cursor: pointer;
      padding: 4px 8px;
    }
    
    .search-clear:hover {
      color: #c93a3a;
    }
    
    .builds-container {
      padding: 12px 16px;
      padding-bottom: 60px;
      height: calc(100vh - 260px);
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: #3d434b #0d1117;
      scroll-behavior: smooth;
      overscroll-behavior: contain;
    }
    
    .builds-container.full-height {
      height: calc(100vh - 200px);
    }
    
    .builds-container::-webkit-scrollbar {
      width: 4px;
    }
    
    .builds-container::-webkit-scrollbar-track {
      background: transparent;
    }
    
    .builds-container::-webkit-scrollbar-thumb {
      background: #2d333b;
      border-radius: 2px;
    }
    
    .builds-container::-webkit-scrollbar-thumb:hover {
      background: #3d434b;
    }
    
    .build {
      background: linear-gradient(145deg, #13181e, #0f1216);
      border: 1px solid #2d333b;
      border-radius: 10px;
      padding: 8px;
      padding-bottom: 10px;
      margin-bottom: 4px;
      position: relative;
      overflow: hidden;
    }
    
    .build.animate {
      animation: fadeSlideIn 0.5s cubic-bezier(0.22, 1, 0.36, 1) forwards;
      opacity: 0;
      transform: translateY(20px);
    }
    
    @keyframes fadeSlideIn {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    
    .build:last-child {
      margin-bottom: 12px;
    }
    
    .build::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--class-color, #4a9c2d), transparent);
      opacity: 0;
      transition: opacity 0.3s;
    }
    
    .build:hover {
      transform: translateY(-2px) scale(1.005);
      border-color: var(--class-color, #4a9c2d);
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.35), 0 0 15px rgba(74, 156, 45, 0.08);
    }
    
    .build:hover::before {
      opacity: 1;
    }
    
    .build-name {
      font-size: 17px;
      font-weight: 700;
      color: var(--class-color, #4a9c2d);
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    
    .build-section {
      margin-bottom: 4px;
    }
    
    .build-section:last-child {
      margin-bottom: 0;
    }
    
    .build-section-title {
      font-size: 10px;
      color: #a0afbc;
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 2px;
      font-weight: 700;
    }
    
    .build-section-content {
      font-size: 15px !important;
      color: #ffffff;
      line-height: 1.4;
      font-weight: 700;
      font-feature-settings: "liga" 1, "kern" 1;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      font-variant-numeric: tabular-nums;
      font-size-adjust: 0.55;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
    }
    
    .weapon-text {
      display: block;
      margin-bottom: 4px;
    }
    
    .weapon-left {
      display: flex;
      flex-direction: column;
      gap: 0;
      flex: 1;
    }

    .build-numbers {
      font-weight: 700;
      color: #FFB300;
      margin-left: 6px;
    }
    
    .build-section.perks .build-section-title {
      color: #d4a017;
    }
    
    .build-section.notes {
      margin-top: 12px;
      padding-top: 14px;
      padding-bottom: 8px;
      border-top: 1px solid rgba(45, 51, 59, 0.4);
    }
    
    .build-section.notes .build-section-title {
      color: #8a9aaa;
    }
    
    .build-section.notes .build-section-content {
      color: #a8b2c0;
      font-size: 13px;
      font-style: italic;
      line-height: 1.5;
    }
    
    .perk-tier {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 10px;
      font-weight: 700;
      margin-right: 8px;
    }
    
    .perk-tier.S { background: #c93a3a; color: white; }
    .perk-tier.A { background: #e05555; color: white; }
    .perk-tier.B { background: #d4a017; color: black; }
    .perk-tier.C { background: #6a7a8a; color: white; }
    .perk-tier.D { background: #4a4a4a; color: #aaa; }
    
    .perk-category {
      font-size: 14px;
      font-weight: 700;
      color: #4a9c2d;
      margin-top: 20px;
      margin-bottom: 12px;
      text-transform: uppercase;
      letter-spacing: 2px;
      padding: 6px 12px;
      border-radius: 6px;
      text-align: center;
    }
    
    .perk-category:first-child {
      margin-top: 0;
    }
    
    .perk-category.S { 
      color: #ff3333; 
      background: rgba(255, 51, 51, 0.15);
      border: 1px solid #ff3333;
      text-shadow: 0 0 10px rgba(255, 51, 51, 0.5);
    }
    .perk-category.A { 
      color: #ff6b35; 
      background: rgba(255, 107, 53, 0.15);
      border: 1px solid #ff6b35;
      text-shadow: 0 0 10px rgba(255, 107, 53, 0.5);
    }
    .perk-category.B { 
      color: #ffd700; 
      background: rgba(255, 215, 0, 0.15);
      border: 1px solid #ffd700;
      text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
    }
    .perk-category.C { 
      color: #4ecdc4; 
      background: rgba(78, 205, 196, 0.15);
      border: 1px solid #4ecdc4;
      text-shadow: 0 0 10px rgba(78, 205, 196, 0.5);
    }
    .perk-category.D { 
      color: #9b59b6; 
      background: rgba(155, 89, 182, 0.15);
      border: 1px solid #9b59b6;
      text-shadow: 0 0 10px rgba(155, 89, 182, 0.5);
    }
    
    .perk-category.ultimate { 
      color: #ff00ff; 
      background: rgba(255, 0, 255, 0.1);
      border: 1px solid #ff00ff;
      text-shadow: 0 0 15px rgba(255, 0, 255, 0.7);
      margin-top: 30px;
      font-size: 18px;
      box-shadow: 0 0 20px rgba(255, 0, 255, 0.3);
    }
    
    .ultimate-section {
      background: rgba(255, 0, 255, 0.05);
      border: 1px solid rgba(255, 0, 255, 0.2);
      border-radius: 12px;
      padding: 16px;
      margin-top: 8px;
    }
    
    .ultimate-label {
      color: #ff00ff;
      font-weight: 700;
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 6px;
      padding-left: 8px;
    }
    
    .ultimate-perks {
      color: #e8e8e8;
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 12px;
      padding-left: 8px;
    }
    
    .ultimate-perks:last-child {
      margin-bottom: 0;
    }
    
    .ult-perk {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-right: 16px;
      margin-bottom: 6px;
    }
    
    .ult-icon {
      width: 20px;
      height: 20px;
      object-fit: contain;
      opacity: 0.9;
    }
    
.perk-item {
  display: flex;
  flex-direction: column;
  justify-content: flex-start;
  gap: 4px;
  min-height: 70px;
}
    
    .perk-item:last-child {
      border-bottom: none;
    }
    
.perk-name {
  font-size: 15px;
  font-weight: 700;
  color: #ffffff;
  margin-bottom: 4px;
  text-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
  height: 20px;
  line-height: 20px;
  overflow: hidden;
}
    
.perk-desc {
  font-size: 13px;
  color: #b0bcc8;
  line-height: 1.4;
  max-height: 4.2em; /* ровно 3 строки */
  overflow: hidden;
  text-align: left;
  display: -webkit-box;
  -webkit-line-clamp: 3;
  -webkit-box-orient: vertical;
}
    
    .oc-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px 0;
      border-bottom: 1px solid rgba(45, 51, 59, 0.3);
    }
    
    .oc-item:last-child {
      border-bottom: none;
    }
    
    .oc-tier {
      font-size: 40px;
      font-weight: 700;
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 6px;
      flex-shrink: 0;
      line-height: 1;
      background: transparent !important;
      color: #ffffff !important;
    }
    
    .oc-tier.S { color: #c93a3a !important; }
    .oc-tier.A { color: #e05555 !important; }
    .oc-tier.B { color: #d4a017 !important; }
    .oc-tier.C { color: #4a9c2d !important; }
    
    .oc-info {
      flex: 1;
      padding-top: 2px;
    }
    
    .oc-name {
      font-size: 15px;
      font-weight: 700;
      color: #ffffff;
    }
    
    .oc-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 200px;
      height: 200px;
      position: relative;
      padding: 0;
      box-sizing: border-box;
      background: none;
      border-radius: 0;
    }
    
    .oc-icon::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-repeat: no-repeat;
      background-position: center;
      background-size: contain;
      border-radius: 0;
      opacity: 1;
      pointer-events: none;
    }
    
    .oc-icon.clean::before { background-image: url('kloki png/Frame_Overclock_Clean.png'); }
    .oc-icon.balanced::before { background-image: url('kloki png/Frame_Overclock_Balanced.png'); }
    .oc-icon.unstable::before { background-image: url('kloki png/Frame_Overclock_Unstable.png'); }
    
    .oc-icon img {
      width: 50px;
      height: 50px;
      object-fit: contain;
      position: relative;
      z-index: 2;
    }
    
    .oc-type {
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 8px;
      opacity: 1;
    }
    
    .oc-desc {
      font-size: 13px;
      color: #b0bcc8;
      line-height: 1.5;
    }
    
    .oc-type.clean { color: #4a9c2d; }
    .oc-type.balanced { color: #d4a017; }
    .oc-type.unstable { color: #e05555; }
    
    
    .build-section .oc-name {
      font-size: 14px;
      font-weight: 700;
      margin-top: 2px;
      border-left: 3px solid currentColor;
      display: inline-block;
      padding-left: 5px;
    }
    
    .build-section .oc-name.clean { color: #4a9c2d; }
    .build-section .oc-name.balanced { color: #d4a017; }
    .build-section .oc-name.unstable { color: #e05555; }
    
    .build-section .oc-name .oc-icon {
      display: inline-block;
      width: 18px;
      height: 18px;
      vertical-align: middle;
      margin-left: 6px;
      background-size: contain;
      background-repeat: no-repeat;
      background-position: center;
    }
    
    .build-section .oc-name .oc-icon img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }
    
    .build-section-content .oc-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 100px;
      height: 100px;
      min-width: 100px;
      min-height: 100px;
      position: relative;
      padding: 0;
      box-sizing: border-box;
      vertical-align: middle;
      margin-left: 10px;
      background: none;
      border-radius: 0;
      flex-shrink: 0;
    }
    
    .build-section-content .oc-icon::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-repeat: no-repeat;
      background-position: center;
      background-size: contain;
      border-radius: 0;
      opacity: 1;
      pointer-events: none;
    }
    
    .build-section-content .oc-icon.clean::before { 
      background-image: url('kloki png/Frame_Overclock_Clean.png');
    }
    .build-section-content .oc-icon.balanced::before { 
      background-image: url('kloki png/Frame_Overclock_Balanced.png');
    }
    .build-section-content .oc-icon.unstable::before { 
      background-image: url('kloki png/Frame_Overclock_Unstable.png');
    }
    
    .build-section-content .oc-icon img {
      width: 60px;
      height: 60px;
      object-fit: contain;
      position: relative;
      z-index: 2;
    }
    
    .build-section .perks-content {
      color: #d0d8e4;
    }
    
    .my-builds-form {
      padding: 16px;

    function highlightNumbers(text) {
      return text.replace(/\b(\d(?:-\d){4,})\b/g, '<span class="build-numbers">$1</span>');
    }
    
    function toggleBuildFavorite(buildName, className) {
      const savedFavorites = JSON.parse(localStorage.getItem('drg_favorites') || '[]');
      const existingIndex = savedFavorites.findIndex(f => f.name === buildName && f.class === className);
      
      if (existingIndex >= 0) {
        savedFavorites.splice(existingIndex, 1);
      } else {
        savedFavorites.push({ name: buildName, class: className });
      }
      
      localStorage.setItem('drg_favorites', JSON.stringify(savedFavorites));
      renderContent();
    }
    
    const hints = {
      ru: '<span>F5</span> Показать | <span>F6</span> Выход | <span>F7</span> RU',
      en: '<span>F5</span> Show | <span>F6</span> Exit | <span>F7</span> EN'
    };
    
    async function loadBuilds() {
      buildsData = await window.api.getBuilds();
      loadMyBuilds();
      renderContent();
    }
    
    function loadMyBuilds() {
      const saved = localStorage.getItem('drg_mybuilds');
      if (saved) {
        myBuilds = JSON.parse(saved);
      }
    }
    
    function saveMyBuilds() {
      localStorage.setItem('drg_mybuilds', JSON.stringify(myBuilds));
    }
    
async function switchTab(tab) {
        currentTab = tab;
        viewState = 'class';
        currentWeapon = null;
        
        document.querySelectorAll('.tab-btn').forEach(btn => {
          btn.classList.toggle('active', btn.dataset.tab === tab);
        });
        
        if (tab === 'perks' || tab === 'settings') {
          document.getElementById('classSelect').style.display = 'none';
        } else {
          document.getElementById('classSelect').style.display = 'flex';
        }
        document.getElementById('weaponSelect').style.display = 'none';
        document.getElementById('weaponSelect').innerHTML = '';
        document.getElementById('buildsContainer').style.display = 'block';
        document.getElementById('buildsContainer').classList.remove('full-height');
        
        // Показывать поиск только на вкладке билдов
        document.getElementById('searchBox').style.display = tab === 'builds' ? 'flex' : 'none';
        
        // Очистить поиск при переходе с вкладки билдов
        if (tab !== 'builds') {
          searchQuery = '';
          document.getElementById('buildSearch').value = '';
        }
        
        if (tab === 'ocs') {
          viewState = 'weapon';
          document.getElementById('buildsContainer').style.display = 'none';
          // restore last selected weapon for this class, if any
          currentWeapon = lastWeaponByClass[currentClass] || null;
          setTimeout(() => {
            renderWeaponSelect();
          }, 0);
        }
        
        if (tab === 'settings') {
          await renderSettingsModal();
          return;
        }
        
        renderContent();
      }
    
    function selectClass(cls) {
      currentClass = cls;
      currentWeapon = null;
      
      // Очистить поиск при смене класса
      searchQuery = '';
      document.getElementById('buildSearch').value = '';
      
      document.querySelectorAll('.class-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.class === cls);
      });
      
      if (currentTab === 'ocs') {
        viewState = 'weapon';
        renderWeaponSelect();
      } else {
        document.getElementById('buildsContainer').style.display = 'block';
      }
      
      renderContent();
    }
    
function selectWeapon(weaponKey) {
       // Всегда храним ключ на русском
       let ruKey = weaponKey;
       if (lang === 'en') {
         const ruKeyEntry = Object.entries(weaponKeyToEn).find(([ru, en]) => en === weaponKey);
         if (ruKeyEntry) ruKey = ruKeyEntry[0];
       }
       currentWeapon = ruKey;
       // Запоминаем последнее выбранное оружие для класса
       lastWeaponByClass[currentClass] = ruKey;
       
       document.querySelectorAll('.weapon-btn').forEach(btn => {
         btn.classList.toggle('active', btn.dataset.weapon === ruKey);
       });
       
       viewState = 'oc';
       document.getElementById('weaponSelect').style.display = 'none';
       renderContent();
     }
    
    function goBack() {
      if (viewState === 'oc') {
        viewState = 'weapon';
        document.getElementById('weaponSelect').style.display = 'grid';
        document.getElementById('buildsContainer').style.display = 'none';
      } else if (viewState === 'weapon') {
        viewState = 'class';
        document.getElementById('weaponSelect').style.display = 'none';
        document.getElementById('weaponSelect').innerHTML = '';
        document.getElementById('buildsContainer').style.display = 'block';
      }
      renderContent();
    }
    
    function renderWeaponSelect() {
      const container = document.getElementById('weaponSelect');
      const buildsContainer = document.getElementById('buildsContainer');
      const weapons = weaponNames[currentClass][lang];
      const keys = weaponKeys[currentClass];
      
      buildsContainer.style.display = 'none';
      
      const order = [0, 1, 2, 3, 4, 5];
      
      container.innerHTML = order.map(i => {
        const key = keys[i];
        const displayKey = lang === 'en' ? (weaponKeyToEn[key] || key) : key;
        const isActive = currentWeapon === key;
        return `<button class="weapon-btn ${isActive ? 'active' : ''}" 
                data-weapon="${encodeURIComponent(key)}">${weapons[i]}</button>`;
      }).join('');
      
      container.querySelectorAll('.weapon-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          selectWeapon(decodeURIComponent(btn.dataset.weapon));
        });
      });
      
      container.style.display = 'grid';
    }
    
    function renderContent() {
      const container = document.getElementById('buildsContainer');
      const color = classColors[currentClass];
      
      container.style.setProperty('--class-color', color);
      
      if (currentTab === 'builds') {
        renderBuilds(container, color);
      } else if (currentTab === 'ocs') {
        renderOCs(container, color);
      } else if (currentTab === 'perks') {
        renderPerks(container);
      } else if (currentTab === 'mybuilds') {
        renderMyBuildsForm(container);
      }
      
      document.getElementById('langBtn').textContent = lang === 'ru' ? 'EN' : 'RU';
      document.getElementById('hint').innerHTML = hints[lang];
    }
    
    function renderBuilds(container, color) {
      let builds = buildsData[lang]?.[currentClass] || [];
      const ocData = buildsData[lang]?.overclock || {};
      
      if (!builds.length && lang === 'en') {
        builds = buildsData['ru']?.[currentClass] || [];
      }
      
      // Добавляем свои билды в начало
      const myBuildsFiltered = myBuilds.filter(b => b.class === currentClass);
      builds = [...myBuildsFiltered, ...builds];
      
      // Получаем избранные билды
      const savedFavorites = JSON.parse(localStorage.getItem('drg_favorites') || '[]');
      const favoriteNames = savedFavorites
        .filter(f => f.class === currentClass)
        .map(f => f.name);
      
      // Сортируем: избранные в начале
      builds = builds.sort((a, b) => {
        const aFav = favoriteNames.includes(a.name) ? 1 : 0;
        const bFav = favoriteNames.includes(b.name) ? 1 : 0;
        return bFav - aFav;
      });
      
      // Фильтрация по поиску
      if (searchQuery) {
        const q = searchQuery.toLowerCase();
        builds = builds.filter(b => {
          const primary = (b.primary || '').toLowerCase();
          const secondary = (b.secondary || '').toLowerCase();
          const primaryOC = (b.primaryOC || '').toLowerCase();
          const secondaryOC = (b.secondaryOC || '').toLowerCase();
          return primary.includes(q) || secondary.includes(q) || primaryOC.includes(q) || secondaryOC.includes(q);
        });

      container.innerHTML = builds.map((build, index) => {
        const isFavorite = favoriteNames.includes(build.name);

        const primaryOCType = build.primaryOC ? typeMap[getOCType(build.primaryOC)] || getOCType(build.primaryOC).toLowerCase() : '';
        const secondaryOCType = build.secondaryOC ? typeMap[getOCType(build.secondaryOC)] || getOCType(build.secondaryOC).toLowerCase() : '';
        return `

          </div>` : ''}
          ${build.secondary ? `<div class="build-section">
            <div class="build-section-title">${lang === 'ru' ? 'Вторичное' : 'Secondary'}</div>
            <div class="build-section-content"><div class="weapon-left"><span class="weapon-text">${highlightNumbers(build.secondary)}</span>${build.secondaryOC ? `<div class="oc-name ${secondaryOCType}">${build.secondaryOC}</div>` : ''}</div>${build.secondaryOC ? getOCIcon(build.secondaryOC, secondaryOCType, lang) : ''}</div>
          </div>` : ''}

            <div class="build-section-content">${build.notes}</div>

        </div>`;
      }).join('');
      
      if (!builds.length) {
        container.innerHTML = `<div class="build" style="--class-color: ${color}">
          <div class="build-name">${searchQuery ? (lang === 'ru' ? 'Нет результатов' : 'No results') : (lang === 'ru' ? 'Нет билдов' : 'No builds')}</div>

    let editingIndex = -1;
    
    function addBuild() {
      const name = document.getElementById('buildName').value.trim();
      const buildClass = document.getElementById('buildClass').value;
      const primary = document.getElementById('buildPrimary').value.trim();
      const primaryOC = document.getElementById('buildPrimaryOC').value.trim();
      const secondary = document.getElementById('buildSecondary').value.trim();
      const secondaryOC = document.getElementById('buildSecondaryOC').value.trim();
      const perks = document.getElementById('buildPerks').value.trim();
      const notes = document.getElementById('buildNotes').value.trim();
      
      document.querySelectorAll('.form-input').forEach(el => el.classList.remove('error'));
      
      if (!name) {
        document.getElementById('buildName').classList.add('error');
        return;
      }
      
      const newBuild = { name, class: buildClass, primary, primaryOC, secondary, secondaryOC, perks, notes };
      
      if (editingIndex >= 0) {
        myBuilds[editingIndex] = newBuild;
        editingIndex = -1;
        document.getElementById('addBuildBtn').textContent = lang === 'ru' ? 'Добавить' : 'Add';
      } else {
        myBuilds.push(newBuild);
      }
      
      saveMyBuilds();
      clearForm();
      renderContent();
    }
    
    function clearForm() {
      document.getElementById('buildName').value = '';
      document.getElementById('buildPrimary').value = '';
      document.getElementById('buildPrimaryOC').value = '';
      document.getElementById('buildSecondary').value = '';
      document.getElementById('buildSecondaryOC').value = '';
      document.getElementById('buildPerks').value = '';
      document.getElementById('buildNotes').value = '';
      editingIndex = -1;
      document.getElementById('addBuildBtn').textContent = lang === 'ru' ? 'Добавить' : 'Add';
    }
    
    function deleteBuild(index) {
      myBuilds.splice(index, 1);
      saveMyBuilds();
      renderContent();
    }
    
    function toggleFavorite(index) {
      myBuilds[index].favorite = !myBuilds[index].favorite;
      saveMyBuilds();
      renderContent();
    }
    
    function editBuild(index) {
      const b = myBuilds[index];
      document.getElementById('buildName').value = b.name || '';
      document.getElementById('buildClass').value = b.class || 'gunner';
      document.getElementById('buildPrimary').value = b.primary || '';
      document.getElementById('buildPrimaryOC').value = b.primaryOC || '';
      document.getElementById('buildSecondary').value = b.secondary || '';
      document.getElementById('buildSecondaryOC').value = b.secondaryOC || '';
      document.getElementById('buildPerks').value = b.perks || '';
      document.getElementById('buildNotes').value = b.notes || '';
      editingIndex = index;
      document.getElementById('addBuildBtn').textContent = lang === 'ru' ? 'Сохранить' : 'Save';
      document.getElementById('buildsContainer').scrollTop = 0;
    }
    
    function useBuild(index) {
      const build = myBuilds[index];
      currentClass = build.class;
      currentTab = 'builds';
      
      document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.tab === 'builds');
      });
      
      document.getElementById('classSelect').style.display = 'flex';
      document.querySelectorAll('.class-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.class === build.class);
      });
      
      document.getElementById('weaponSelect').style.display = 'none';
      
      if (!buildsData[lang]) buildsData[lang] = {};
      if (!buildsData[lang][build.class]) buildsData[lang][build.class] = [];
      buildsData[lang][build.class].push(build);
      
      renderContent();
    }
    
function toggleLang() {
       lang = lang === 'ru' ? 'en' : 'ru';
       localStorage.setItem('drg_lang', lang);
       document.getElementById('tabBuilds').textContent = lang === 'ru' ? 'Билды' : 'Builds';
       document.getElementById('tabOCs').textContent = lang === 'ru' ? 'Клоки' : 'OCs';
       document.getElementById('tabPerks').textContent = lang === 'ru' ? 'Перки' : 'Perks';
       document.getElementById('tabMyBuilds').textContent = lang === 'ru' ? 'Мои билды' : 'My Build';
       document.getElementById('buildSearch').placeholder = lang === 'ru' ? 'Поиск по оружию или клокам...' : 'Search weapons or OCs...';
       if (currentTab === 'ocs') {
         if (viewState === 'weapon') {
           renderWeaponSelect();
         } else if (viewState === 'oc') {
           renderContent();
         }
       }
       updateHints();
      renderContent();
    }
    
function closeOverlay() {
  const overlay = document.getElementById('overlay');

  // запускаем анимацию
  overlay.classList.remove('visible');

  // если открыта модалка — тоже закрываем плавно
  document.getElementById('settingsModal').classList.remove('visible');

  // ждём анимацию
  setTimeout(() => {
    window.api.hideOverlay();
  }, 200);
}
    
async function openSettings() {
  await renderSettingsModal();
  document.getElementById('settingsModal').classList.add('visible');
}
    
function closeSettings() {
  console.log('closeSettings called');
  document.getElementById('settingsModal').classList.remove('visible');
}
    
function renderSettingsModal() {
   const content = document.getElementById('settingsContent');
   const title = document.getElementById('settingsTitle');
   const closeBtn = document.getElementById('settingsCloseBtn');
   
   title.textContent = lang === 'ru' ? 'Настройки' : 'Settings';
   closeBtn.textContent = lang === 'ru' ? 'Закрыть' : 'Close';
   
   content.innerHTML = `
     <div class="setting-row">
       <span class="setting-label">${lang === 'ru' ? 'Показать' : 'Show'}</span>
       <input type="text" class="setting-input" value="${hotkeys.show}" onclick="changeHotkey('show')" readonly>
     </div>
     <div class="setting-row">
       <span class="setting-label">${lang === 'ru' ? 'Выход' : 'Exit'}</span>
       <input type="text" class="setting-input" value="${hotkeys.exit}" onclick="changeHotkey('exit')" readonly>
     </div>
     <div class="setting-row">
       <span class="setting-label">${lang === 'ru' ? 'Язык' : 'Language'}</span>
       <input type="text" class="setting-input" value="${hotkeys.lang}" onclick="changeHotkey('lang')" readonly>
     </div>
   `;
   
   // Attach close listener
   closeBtn.onclick = closeSettings;
 }
    
    function changeHotkey(action) {
      const input = event.target;
      input.value = '...';
      input.style.borderColor = '#d4a017';
      
      window.api.unregisterHotkeys();
      
      const handleKey = (e) => {
        e.preventDefault();
        e.stopPropagation();
        
        let key = e.key;
        
        if (key === ' ') {
          key = 'Space';
        } else if (key.length === 1) {
          if (/[a-zA-Z]/.test(key)) {
            key = key.toUpperCase();
          }
        }
        
        const validKeys = ['F1','F2','F3','F4','F5','F6','F7','F8','F9','F10','F11','F12','Space','Escape','Enter','Tab','Backspace','Delete','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'];
        
        if (validKeys.includes(key) || (key.length === 1 && /[A-Z0-9]/.test(key))) {
          hotkeys[action] = key;
          localStorage.setItem('drg_hotkeys', JSON.stringify(hotkeys));
          window.api.updateHotkeys(hotkeys);
          renderSettingsModal();
          updateHints();
          document.removeEventListener('keydown', handleKey, { capture: true });
        }
      };
      
      document.addEventListener('keydown', handleKey, { capture: true });
    }
    
    function loadHotkeys() {
      const saved = localStorage.getItem('drg_hotkeys');
      if (saved) {
        hotkeys = JSON.parse(saved);
      }
      updateHints();
    }
    
    function saveHotkeys() {
      localStorage.setItem('drg_hotkeys', JSON.stringify(hotkeys));
      window.api.updateHotkeys(hotkeys);
    }
    
    function updateHints() {
      document.getElementById('hint').innerHTML = `<span>${hotkeys.show}</span> ${lang === 'ru' ? 'Показать' : 'Show'} | <span>${hotkeys.exit}</span> ${lang === 'ru' ? 'Выход' : 'Exit'} | <span>${hotkeys.lang}</span> ${lang === 'ru' ? 'RU' : 'EN'}`;
    }
    
    window.api.onAnimateShow(() => {
      document.getElementById('overlay').classList.add('visible');
      shouldAnimate = true;
    });
    
    window.api.onAnimateHide(() => {
      document.getElementById('overlay').classList.remove('visible');
    });
    
    window.api.onToggleLang(() => {
      toggleLang();
    });
    
    loadBuilds();
    
    // Поиск билдов
    const searchInput = document.getElementById('buildSearch');
    const searchClear = document.getElementById('searchClear');
    
    searchInput.addEventListener('input', (e) => {
      searchQuery = e.target.value.trim();
      renderContent();
    });
    
    searchClear.addEventListener('click', () => {
      searchInput.value = '';
      searchQuery = '';
      renderContent();
    });
    loadHotkeys();
    const overlay = document.getElementById('overlay');
    overlay.classList.add('visible');
    console.log('Overlay visible added:', overlay.classList.contains('visible'));
    console.log('Overlay element:', overlay);
    console.log('Overlay CSS:', getComputedStyle(overlay).opacity);
    
    // Click-through: enable clicks when hovering over overlay
    document.getElementById('overlay').addEventListener('mouseenter', () => {
      window.api.setClickThrough(false);
    });
    
    document.getElementById('overlay').addEventListener('mouseleave', () => {
      window.api.setClickThrough(true);
    });
    
    // Drag - простой
    const d = document.getElementById('drag-region');
    let m, sx, sy;
    d.onmousedown = e => { m = 1; sx = e.screenX; sy = e.screenY; };
    document.onmouseup = () => m = 0;
    document.onmousemove = e => { if(!m)return; let dx=e.screenX-sx,dy=e.screenY-sy; sx=e.screenX; sy=e.screenY; window.api.moveBy(dx,dy); };
  </script>
</body>
</html>
